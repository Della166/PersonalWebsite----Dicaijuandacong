<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1420" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13241C"/>
      <stop offset="0.55" stop-color="#0E1714"/>
      <stop offset="1" stop-color="#251E16"/>
    </linearGradient>
    <linearGradient id="glass" x1="360" y1="180" x2="1260" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.16"/>
      <stop offset="1" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="accent" x1="270" y1="690" x2="1260" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7FBC8C"/>
      <stop offset="1" stop-color="#D4A574"/>
    </linearGradient>
    <filter id="blur" x="-180" y="-180" width="1960" height="1260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <g opacity="0.8" filter="url(#blur)">
    <circle cx="360" cy="220" r="160" fill="#3D8B55"/>
